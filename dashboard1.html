<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - WaitWizard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
  <style>
    .top-icons {
      display: flex;
      align-items: center;
      gap: 22px;
      position: fixed;
      top: 15px;
      right: 28px;
      z-index: 1000;
    }
    
    .notification-bell {
      position: relative;
      cursor: pointer;
      font-size: 24px;
      color: #365f6b;
      transition: color 0.2s;
    }
    
    .notification-bell:hover {
      color: #2e7d32;
    }
    
    .notification-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #e74c3c;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .notification-dropdown {
      position: absolute;
      top: 40px;
      right: 0;
      width: 350px;
      max-height: 400px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      border: 1px solid #e0e0e0;
      display: none;
      z-index: 1001;
      overflow: hidden;
    }
    
    .notification-header {
      padding: 15px 20px;
      border-bottom: 1px solid #e0e0e0;
      background: #f8f9fa;
      font-weight: 600;
      color: #365f6b;
    }
    
    .notification-list {
      max-height: 300px;
      overflow-y: auto;
    }
    
    .notification-item {
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .notification-item:hover {
      background: #f8f9fa;
    }
    
    .notification-item.unread {
      background: #e3f2fd;
      border-left: 3px solid #2196f3;
    }
    
    .notification-message {
      font-size: 14px;
      color: #333;
      margin-bottom: 4px;
    }
    
    .notification-time {
      font-size: 12px;
      color: #666;
    }
    
    .notification-footer {
      padding: 10px 20px;
      text-align: center;
      border-top: 1px solid #e0e0e0;
      background: #f8f9fa;
    }
    
    .clear-all-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .clear-all-btn:hover {
      text-decoration: underline;
    }
    
    .no-notifications {
      padding: 30px 20px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Welcome to WaitWizard, <span id="username"></span>!</h1>
    <p>"Track, monitor, and manage your queues without hassle"</p>
  </header>
  <div class="top-icons">
    <div class="notification-bell" id="notificationBell">
      🔔
      <div class="notification-badge" id="notificationBadge" style="display: none;">0</div>
      <div class="notification-dropdown" id="notificationDropdown">
        <div class="notification-header">
          Notifications
        </div>
        <div class="notification-list" id="notificationList">
          <div class="no-notifications">No new notifications</div>
        </div>
        <div class="notification-footer">
          <button class="clear-all-btn" id="clearAllNotifications">Clear All</button>
        </div>
      </div>
    </div>
    <span id="profileIcon" title="Profile" role="button" tabindex="0">
      <img src="profile.png" alt="Profile Icon" style="width:42px; height:42px;">
    </span>
    <span id="logoutIcon" title="Logout" role="button" tabindex="0">
      <img src="logout.png" alt="Logout Icon" style="width:36px; height:36px;">
    </span>
  </div>
  <!-- Profile Panel -->
  <div id="profilePanel" class="profile-panel" aria-hidden="true">
    <div class="profile-avatar-bar">
      <div class="profile-avatar">
        <img src="profile.png" alt="Profile Icon" style="width:42px; height:42px;">
      </div>
      <h2>My Profile</h2>
      <span class="close-profile" id="closeProfile" role="button" tabindex="0" aria-label="Close Profile Panel">&times;</span>
    </div>
    <div id="profileContent" class="profile-content-card">Loading profile...</div>
  </div>
  <main id="dashboardMain">
    <section class="grid-menu">
      <div class="card active" data-link="home.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/home.png" alt="Home" />
    </div>
    <div class="label">Home</div>
</div>

<div class="card" data-link="take-ticket.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/appointment.png" alt="Book Appointment" />
    </div>
    <div class="label">Book Appointment</div>
</div>

<div class="card" data-link="my-tickets.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/track.png" alt="My Tickets" />
    </div>
    <div class="label">My Tickets</div>
</div>

<div class="card" data-link="swap-ticket.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/swap.png" alt="Swap Appointment" />
    </div>
    <div class="label">Swap Appointment</div>
</div>

<div class="card" data-link="cancel-ticket.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/cancel.png" alt="Cancel Appointment" />
    </div>
    <div class="label">Cancel Appointment</div>
</div>

<div class="card" data-link="chatbot.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/chatbot.png" alt="Chatbot" />
    </div>
    <div class="label">Chatbot</div>
</div>

<div class="card" data-link="ticket-history.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/history.png" alt="History" />
    </div>
    <div class="label">History</div>
</div>

<div class="card" data-link="track-ticket.html" role="button" tabindex="0">
    <div class="icon">
        <img src="icons/track.png" alt="Track Ticket" />
    </div>
    <div class="label">Track Ticket</div>
</div>
    </section>
  </main>
  <div id="logoutDialogOverlay" class="logout-dialog-overlay" style="display:none;">
    <div class="logout-dialog">
      <div class="dialog-title">Are you sure you want to logout?</div>
      <div class="dialog-actions">
        <button id="logoutOk" class="dialog-btn ok-btn">OK</button>
        <button id="logoutCancel" class="dialog-btn cancel-btn">Cancel</button>
      </div>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
