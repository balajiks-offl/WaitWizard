<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Register</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Create Account</h2>
            <form id="registerForm" novalidate>
                <div class="input-row">
                    <input type="text" placeholder="First Name" name="firstname" required />
                    <input type="text" placeholder="Last Name" name="lastname" required />
                </div>

                <label class="label-title">Gender</label>
                <div class="gender-group">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="male" required />
                        <span class="gender-icon">&#9794;</span>
                        Male
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="female" required />
                        <span class="gender-icon">&#9792;</span>
                        Female
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="other" required />
                        <span class="gender-icon">&#9895;</span>
                        Other
                    </label>
                </div>

                <input type="text"
                       placeholder="Phone No"
                       name="phone"
                       id="phoneInput"
                       required
                       pattern="\d{10}"
                       maxlength="10"
                       inputmode="numeric"
                       title="Please enter exactly 10 digits" />

                <input type="text"
                       placeholder="Alternate Phone No"
                       name="altphone"
                       id="altphoneInput"
                       required
                       pattern="\d{10}"
                       maxlength="10"
                       inputmode="numeric"
                       title="Please enter exactly 10 digits" />

                <input type="email"
                       placeholder="Email"
                       name="email"
                       id="emailInput"
                       required />

                <div id="emailError" style="color: #d9534f; font-size: 13px; display: none; margin-top: -8px; margin-bottom: 10px;">
                    Invalid email address
                </div>

                <input type="text" placeholder="Username" name="username" required />
                <input type="password" placeholder="Password" name="password" required />
                <input type="date" placeholder="Date of Birth" name="dob" required />
                <textarea placeholder="Address" name="address" rows="2" required></textarea>

                <button class="primary-btn" type="submit" id="submitBtn">Register</button>
            </form>
            <p class="switch-link">
                Already have an account? <a href="index.html">Sign In</a>
            </p>
        </div>
    </div>

    <script>
      const form = document.getElementById('registerForm');
      const emailInput = document.getElementById('emailInput');
      const emailError = document.getElementById('emailError');
      const phoneInput = document.getElementById('phoneInput');
      const altphoneInput = document.getElementById('altphoneInput');

      // Function to allow only digits and max length 10 in phone inputs
      function setupDigitOnlyInput(input) {
          input.addEventListener('input', () => {
              let cleaned = input.value.replace(/\D/g, '');
              if (cleaned.length > 10) {
                  cleaned = cleaned.slice(0,10);
              }
              if (cleaned !== input.value) {
                  input.value = cleaned;
              }
          });
      }

      setupDigitOnlyInput(phoneInput);
      setupDigitOnlyInput(altphoneInput);

      // Real-time email validation for presence of '@' and '.'
      emailInput.addEventListener('input', () => {
          const value = emailInput.value;
          if (value.includes('@') && value.includes('.')) {
              emailError.style.display = 'none';
              emailInput.setCustomValidity('');
          } else {
              emailError.style.display = 'block';
              emailInput.setCustomValidity('Invalid email address');
          }
      });

      form.addEventListener('submit', function (e) {
          // Trigger input event for email to set validity based on current input
          emailInput.dispatchEvent(new Event('input'));

          // Validate phone inputs explicitly (pattern attribute helps, but confirm here)
          const phoneRegex = /^\d{10}$/;

          if (!phoneRegex.test(phoneInput.value)) {
              phoneInput.setCustomValidity('Please enter a valid 10-digit phone number.');
          } else {
              phoneInput.setCustomValidity('');
          }

          if (!phoneRegex.test(altphoneInput.value)) {
              altphoneInput.setCustomValidity('Please enter a valid 10-digit alternate phone number.');
          } else {
              altphoneInput.setCustomValidity('');
          }

          if (!form.checkValidity()) {
              e.preventDefault();
              form.reportValidity();
          }
      });
    </script>
</body>
</html>
