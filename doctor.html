<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard</title>
  <link rel="stylesheet" href="doctor.css">
</head>
<body>
  <div class="container">
    <div class="card dashboard-card">
      <h2>Doctor Dashboard</h2>

      <h3>Assigned Tickets</h3>
      <table>
        <thead>
          <tr>
            <th>Ticket #</th>
            <th>Patient</th>
            <th>Type</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>#201</td>
            <td>Alice Brown</td>
            <td>Emergency</td>
            <td>Pending</td>
            <td>
              <button class="accept-btn">Accept</button>
              <button class="reject-btn">Reject</button>
            </td>
          </tr>
        </tbody>
      </table>

      <button class="primary-btn">View History</button>
    </div>
  </div>
</body>
</html>
