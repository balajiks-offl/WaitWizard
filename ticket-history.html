<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ticket History - WaitWizard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #eaf6fb 0%, #fdf6e3 100%);
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: #2c3e50;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #365f6b;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header p {
      color: #5a7484;
      font-size: 1.1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .filter-section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(60, 80, 120, 0.1);
      margin-bottom: 30px;
    }

    .filter-row {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .filter-group label {
      font-weight: 600;
      color: #365f6b;
      font-size: 0.9rem;
    }

    .filter-group select,
    .filter-group input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .history-table {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(60, 80, 120, 0.1);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f8f9fa;
      padding: 15px 12px;
      text-align: left;
      font-weight: 600;
      color: #365f6b;
      border-bottom: 2px solid #e9ecef;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #f1f3f4;
      vertical-align: middle;
    }

    tr:hover {
      background: #f8f9fa;
    }

    .ticket-id {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #365f6b;
    }

    .status-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-completed {
      background: #d4edda;
      color: #155724;
    }

    .status-cancelled {
      background: #f8d7da;
      color: #721c24;
    }

    .status-closed {
      background: #e2e3e5;
      color: #383d41;
    }

    .status-swapped {
      background: #fff3cd;
      color: #856404;
    }

    .type-badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .type-normal {
      background: #e3f2fd;
      color: #1565c0;
    }

    .type-emergency {
      background: #ffebee;
      color: #c62828;
    }

    .no-history {
      text-align: center;
      padding: 60px 20px;
      color: #5a7484;
    }

    .no-history h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #5a7484;
      font-size: 1.1rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(60, 80, 120, 0.1);
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #365f6b;
      margin-bottom: 5px;
    }

    .stat-label {
      color: #5a7484;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .filter-row {
        flex-direction: column;
        align-items: stretch;
      }
      
      .header h1 {
        font-size: 2rem;
      }
      
      .history-table {
        overflow-x: auto;
      }
      
      table {
        min-width: 600px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Ticket History</h1>
    <p>View your completed, cancelled, and closed tickets</p>
  </div>

  <div class="container">
    <!-- Statistics -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="totalHistoryCount">0</div>
        <div class="stat-label">Total History</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="completedCount">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="cancelledCount">0</div>
        <div class="stat-label">Cancelled</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="swappedCount">0</div>
        <div class="stat-label">Swapped</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-section">
      <div class="filter-row">
        <div class="filter-group">
          <label>Status</label>
          <select id="statusFilter">
            <option value="">All Statuses</option>
            <option value="Closed">Completed</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Swapped">Swapped</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Type</label>
          <select id="typeFilter">
            <option value="">All Types</option>
            <option value="normal">Normal</option>
            <option value="emergency">Emergency</option>
          </select>
        </div>
        <div class="filter-group">
          <label>From Date</label>
          <input type="date" id="fromDate">
        </div>
        <div class="filter-group">
          <label>To Date</label>
          <input type="date" id="toDate">
        </div>
      </div>
    </div>

    <!-- History Table -->
    <div class="history-table">
      <div id="historyContainer" class="loading">
        Loading your ticket history...
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCsy799iekDizixCe0LEGJWC-msj6MsvIs",
      authDomain: "digitalqueuesystem.firebaseapp.com",
      databaseURL: "https://digitalqueuesystem-default-rtdb.firebaseio.com",
      projectId: "digitalqueuesystem",
      storageBucket: "digitalqueuesystem.appspot.com",
      messagingSenderId: "934641075368",
      appId: "1:934641075368:web:fa23d50116ef2fd92e6e9d",
      measurementId: "G-TJESH8R15H"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let allHistoryTickets = [];

    // Generate 5-digit ticket ID from document ID
    function generateTicketId(docId) {
      let hash = 0;
      for (let i = 0; i < docId.length; i++) {
        hash = ((hash << 5) - hash) + docId.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash % 100000).toString().padStart(5, '0');
    }

    // Format date for display
    function formatDate(dateString) {
      if (!dateString) return 'Not set';
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    // Format time for display
    function formatTime(timeString) {
      if (!timeString) return 'Not set';
      const [hours, minutes] = timeString.split(':');
      const date = new Date();
      date.setHours(parseInt(hours), parseInt(minutes));
      return date.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    // Update statistics
    function updateStats(tickets) {
      const total = tickets.length;
      const completed = tickets.filter(t => t.status === 'Closed').length;
      const cancelled = tickets.filter(t => t.status === 'Cancelled').length;
      const swapped = tickets.filter(t => t.status === 'Swapped').length;

      document.getElementById('totalHistoryCount').textContent = total;
      document.getElementById('completedCount').textContent = completed;
      document.getElementById('cancelledCount').textContent = cancelled;
      document.getElementById('swappedCount').textContent = swapped;
    }

    // Filter tickets based on current filter values
    function filterTickets() {
      const statusFilter = document.getElementById('statusFilter').value;
      const typeFilter = document.getElementById('typeFilter').value;
      const fromDate = document.getElementById('fromDate').value;
      const toDate = document.getElementById('toDate').value;

      let filtered = allHistoryTickets;

      if (statusFilter) {
        filtered = filtered.filter(ticket => ticket.status === statusFilter);
      }

      if (typeFilter) {
        filtered = filtered.filter(ticket => ticket.ticketType === typeFilter);
      }

      if (fromDate) {
        filtered = filtered.filter(ticket => 
          ticket.appointmentDate && ticket.appointmentDate >= fromDate
        );
      }

      if (toDate) {
        filtered = filtered.filter(ticket => 
          ticket.appointmentDate && ticket.appointmentDate <= toDate
        );
      }

      renderHistoryTable(filtered);
    }

    // Render history table
    function renderHistoryTable(tickets) {
      const container = document.getElementById('historyContainer');
      
      if (tickets.length === 0) {
        container.innerHTML = `
          <div class="no-history">
            <h3>No History Found</h3>
            <p>No tickets match your current filters or you haven't completed any appointments yet.</p>
          </div>
        `;
        return;
      }

      const tableHTML = `
        <table>
          <thead>
            <tr>
              <th>Ticket ID</th>
              <th>Name</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
              <th>Type</th>
              <th>Doctor</th>
              <th>Completed On</th>
            </tr>
          </thead>
          <tbody>
            ${tickets.map(ticket => {
              const ticketId = generateTicketId(ticket.id);
              const statusClass = `status-${ticket.status.toLowerCase()}`;
              const typeClass = `type-${ticket.ticketType || 'normal'}`;
              
              return `
                <tr>
                  <td class="ticket-id">#${ticketId}</td>
                  <td>${ticket.fullName || 'Not provided'}</td>
                  <td>${formatDate(ticket.appointmentDate)}</td>
                  <td>${formatTime(ticket.appointmentTime)}</td>
                  <td><span class="status-badge ${statusClass}">${ticket.status}</span></td>
                  <td><span class="type-badge ${typeClass}">${ticket.ticketType || 'Normal'}</span></td>
                  <td>${ticket.doctorAssigned || 'Not assigned'}</td>
                  <td>${ticket.completedAt ? formatDate(ticket.completedAt.toDate().toISOString().split('T')[0]) : 
                       ticket.cancelledAt ? formatDate(ticket.cancelledAt.toDate().toISOString().split('T')[0]) : 
                       'Not available'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;

      container.innerHTML = tableHTML;
    }

    // Load user history with real-time updates
    function loadUserHistory() {
      if (!currentUser) return;

      // Real-time listener for history tickets
      db.collection("tickets")
        .where("userId", "==", currentUser.uid)
        .where("status", "in", ["Closed", "Cancelled", "Swapped"])
        .orderBy("timestamp", "desc")
        .onSnapshot(snapshot => {
          allHistoryTickets = [];
          snapshot.forEach(doc => {
            allHistoryTickets.push({ id: doc.id, ...doc.data() });
          });
          
          updateStats(allHistoryTickets);
          filterTickets(); // Apply current filters
        }, error => {
          console.error("Error loading history:", error);
          document.getElementById('historyContainer').innerHTML = `
            <div class="no-history">
              <h3>Error Loading History</h3>
              <p>Unable to load your ticket history. Please try refreshing the page.</p>
            </div>
          `;
        });
    }

    // Add event listeners for filters
    document.getElementById('statusFilter').addEventListener('change', filterTickets);
    document.getElementById('typeFilter').addEventListener('change', filterTickets);
    document.getElementById('fromDate').addEventListener('change', filterTickets);
    document.getElementById('toDate').addEventListener('change', filterTickets);

    // Auth state observer
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadUserHistory();
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
