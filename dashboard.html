<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - WaitWizard</title>
  <link rel="stylesheet" href="dashboard.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCsy799iekDizixCe0LEGJWC-msj6MsvIs",
      authDomain: "digitalqueuesystem.firebaseapp.com",
      databaseURL: "https://digitalqueuesystem-default-rtdb.firebaseio.com",
      projectId: "digitalqueuesystem",
      storageBucket: "digitalqueuesystem.appspot.com",
      messagingSenderId: "934641075368",
      appId: "1:934641075368:web:fa23d50116ef2fd92e6e9d",
      measurementId: "G-TJESH8R15H"
    };

    // Init Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
</head>
<body>
  <header class="header">
    <h1>Welcome to WaitWizard, <span id="username"></span>!</h1>
    <p>"Track, monitor, and manage your queues without hassle"</p>
  </header>

  <section class="grid-menu">
    <!-- Home -->
    <div class="card" data-link="home.html">
      <div class="icon">🏠</div>
      <div class="label">Home</div>
    </div>

    <!-- Take a Ticket -->
    <div class="card" data-link="take-ticket.html">
      <div class="icon">🎫</div>
      <div class="label">Take a Ticket</div>
    </div>

    <!-- Track Ticket -->
    <div class="card" data-link="track-ticket.html">
      <div class="icon">📍</div>
      <div class="label">Track Ticket</div>
    </div>

    <!-- Swap Ticket -->
    <div class="card" data-link="swap-ticket.html">
      <div class="icon">🔄</div>
      <div class="label">Swap Ticket</div>
    </div>

    <!-- Cancel Ticket -->
    <div class="card" data-link="cancel-ticket.html">
      <div class="icon">❌</div>
      <div class="label">Cancel Ticket</div>
    </div>

    <!-- Chatbot -->
    <div class="card" data-link="chatbot.html">
      <div class="icon">🤖</div>
      <div class="label">Chatbot</div>
    </div>

    <!-- History -->
    <div class="card" data-link="history.html">
      <div class="icon">📜</div>
      <div class="label">History</div>
    </div>

    <!-- Notifications -->
    <div class="card" data-link="notification.html">
      <div class="icon">🔔</div>
      <div class="label">Notifications</div>
    </div>

    <!-- Profile -->
    <div class="card" data-link="profile.html">
      <div class="icon">👤</div>
      <div class="label">Profile</div>
    </div>

    <!-- Logout -->
    <div class="card" id="logoutBtn">
      <div class="icon">🚪</div>
      <div class="label">Logout</div>
    </div>
  </section>

  <script>
    // Make cards clickable except Logout
    document.querySelectorAll('.card[data-link]').forEach(card => {
      card.addEventListener('click', () => {
        const targetUrl = card.getAttribute('data-link');
        if (targetUrl) {
          window.location.href = targetUrl;
        }
      });
    });

    // Logout functionality
    document.getElementById('logoutBtn').addEventListener('click', () => {
      auth.signOut().then(() => {
        window.location.href = "login.html";
      }).catch(error => {
        console.error("Logout error:", error);
      });
    });

    // Highlight active card
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.card[data-link]').forEach(card => {
      const link = card.getAttribute('data-link');
      if (link === currentPage ||
          (currentPage === "" && link === "home.html") ||
          (currentPage === "dashboard.html" && link === "home.html")) {
        card.classList.add('active');
      }
    });

    // Auth check + display name
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          const docRef = db.collection("users").doc(user.uid);
          const docSnap = await docRef.get();
          if (docSnap.exists) {
            const data = docSnap.data();
            const firstName = data.firstname || data.firstName || "";
            const lastName = data.lastname || data.lastName || "";
            const displayName = (firstName || lastName)
              ? `${firstName} ${lastName}`.trim()
              : user.email.split('@')[0];
            document.getElementById('username').textContent = displayName;
          } else {
            document.getElementById('username').textContent = user.email.split('@')[0];
          }
        } catch (error) {
          console.error("Error fetching user data:", error);
          document.getElementById('username').textContent = user.email.split('@')[0];
        }
      } else {
        window.location.href = "login.html";
      }
    });
  </script>
</body>
</html>
