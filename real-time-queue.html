<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Real-Time Queue - WaitWizard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #eaf6fb 0%, #fdf6e3 100%);
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: #2c3e50;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #365f6b;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #e8f5e8;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      color: #2e7d32;
      font-weight: 600;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(60, 80, 120, 0.1);
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #365f6b;
      margin-bottom: 5px;
    }

    .stat-label {
      color: #5a7484;
      font-size: 0.9rem;
    }

    .queue-section {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(60, 80, 120, 0.1);
      overflow: hidden;
      margin-bottom: 30px;
    }

    .section-header {
      background: #f8f9fa;
      padding: 20px;
      border-bottom: 1px solid #e9ecef;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #365f6b;
      margin: 0;
    }

    .queue-list {
      padding: 0;
    }

    .queue-item {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #f1f3f4;
      transition: background 0.2s;
    }

    .queue-item:hover {
      background: #f8f9fa;
    }

    .queue-item:last-child {
      border-bottom: none;
    }

    .queue-position {
      font-size: 1.2rem;
      font-weight: bold;
      color: #365f6b;
      width: 40px;
      text-align: center;
    }

    .queue-info {
      flex: 1;
      margin-left: 20px;
    }

    .patient-name {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 4px;
    }

    .appointment-time {
      font-size: 0.9rem;
      color: #5a7484;
    }

    .queue-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-waiting {
      background: #fff3cd;
      color: #856404;
    }

    .status-in-progress {
      background: #cce5ff;
      color: #004085;
    }

    .status-next {
      background: #d4edda;
      color: #155724;
    }

    .emergency-indicator {
      background: #ffebee;
      color: #c62828;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 10px;
    }

    .no-queue {
      text-align: center;
      padding: 40px 20px;
      color: #5a7484;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #5a7484;
      font-size: 1.1rem;
    }

    .emergency-alert {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      display: none;
    }

    .emergency-alert.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert-icon {
      color: #d32f2f;
      font-size: 1.2rem;
      margin-right: 10px;
    }

    .alert-message {
      color: #c62828;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2rem;
      }
      
      .queue-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      
      .queue-position {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Real-Time Queue</h1>
    <div class="live-indicator">
      <div class="live-dot"></div>
      Live Updates
    </div>
  </div>

  <div class="container">
    <!-- Emergency Alert -->
    <div id="emergencyAlert" class="emergency-alert">
      <span class="alert-icon">⚠️</span>
      <span class="alert-message" id="emergencyMessage"></span>
    </div>

    <!-- Statistics -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="totalInQueue">0</div>
        <div class="stat-label">Total in Queue</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="currentlyServing">0</div>
        <div class="stat-label">Currently Serving</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="averageWaitTime">0</div>
        <div class="stat-label">Avg Wait (min)</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="emergencyCount">0</div>
        <div class="stat-label">Emergency Cases</div>
      </div>
    </div>

    <!-- Current Queue -->
    <div class="queue-section">
      <div class="section-header">
        <h2 class="section-title">Current Queue</h2>
      </div>
      <div id="queueContainer" class="loading">
        Loading queue information...
      </div>
    </div>

    <!-- Recently Completed -->
    <div class="queue-section">
      <div class="section-header">
        <h2 class="section-title">Recently Completed</h2>
      </div>
      <div id="completedContainer" class="loading">
        Loading completed appointments...
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCsy799iekDizixCe0LEGJWC-msj6MsvIs",
      authDomain: "digitalqueuesystem.firebaseapp.com",
      databaseURL: "https://digitalqueuesystem-default-rtdb.firebaseio.com",
      projectId: "digitalqueuesystem",
      storageBucket: "digitalqueuesystem.appspot.com",
      messagingSenderId: "934641075368",
      appId: "1:934641075368:web:fa23d50116ef2fd92e6e9d",
      measurementId: "G-TJESH8R15H"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let queueListener = null;
    let completedListener = null;

    // Generate 5-digit ticket ID from document ID
    function generateTicketId(docId) {
      let hash = 0;
      for (let i = 0; i < docId.length; i++) {
        hash = ((hash << 5) - hash) + docId.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash % 100000).toString().padStart(5, '0');
    }

    // Format time for display
    function formatTime(timeString) {
      if (!timeString) return 'Not set';
      const [hours, minutes] = timeString.split(':');
      const date = new Date();
      date.setHours(parseInt(hours), parseInt(minutes));
      return date.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    // Calculate estimated wait time
    function calculateWaitTime(position) {
      const avgServiceTime = 15; // minutes per patient
      return position * avgServiceTime;
    }

    // Update statistics
    function updateStats(queueTickets, completedTickets) {
      const totalInQueue = queueTickets.length;
      const currentlyServing = queueTickets.filter(t => t.status === 'In Progress').length;
      const emergencyCount = queueTickets.filter(t => t.ticketType === 'emergency').length;
      
      // Calculate average wait time
      const avgWait = totalInQueue > 0 ? Math.round(calculateWaitTime(totalInQueue / 2)) : 0;

      document.getElementById('totalInQueue').textContent = totalInQueue;
      document.getElementById('currentlyServing').textContent = currentlyServing;
      document.getElementById('averageWaitTime').textContent = avgWait;
      document.getElementById('emergencyCount').textContent = emergencyCount;
    }

    // Render queue
    function renderQueue(tickets) {
      const container = document.getElementById('queueContainer');
      
      if (tickets.length === 0) {
        container.innerHTML = `
          <div class="no-queue">
            <h3>No patients in queue</h3>
            <p>The queue is currently empty.</p>
          </div>
        `;
        return;
      }

      // Sort tickets by priority (emergency first) and then by appointment time
      const sortedTickets = tickets.sort((a, b) => {
        // Emergency tickets first
        if (a.ticketType === 'emergency' && b.ticketType !== 'emergency') return -1;
        if (b.ticketType === 'emergency' && a.ticketType !== 'emergency') return 1;
        
        // Then by appointment time
        if (a.appointmentTime && b.appointmentTime) {
          return a.appointmentTime.localeCompare(b.appointmentTime);
        }
        
        return 0;
      });

      const queueHTML = sortedTickets.map((ticket, index) => {
        const ticketId = generateTicketId(ticket.id);
        const position = index + 1;
        const waitTime = calculateWaitTime(position);
        
        let statusClass = 'status-waiting';
        let statusText = 'Waiting';
        
        if (ticket.status === 'In Progress') {
          statusClass = 'status-in-progress';
          statusText = 'In Progress';
        } else if (position === 1) {
          statusClass = 'status-next';
          statusText = 'Next';
        }

        return `
          <div class="queue-item">
            <div class="queue-position">${position}</div>
            <div class="queue-info">
              <div class="patient-name">
                #${ticketId} - ${ticket.fullName || 'Patient'}
                ${ticket.ticketType === 'emergency' ? '<span class="emergency-indicator">EMERGENCY</span>' : ''}
              </div>
              <div class="appointment-time">
                Scheduled: ${formatTime(ticket.appointmentTime)} | Est. wait: ${waitTime} min
              </div>
            </div>
            <div class="queue-status ${statusClass}">${statusText}</div>
          </div>
        `;
      }).join('');

      container.innerHTML = `<div class="queue-list">${queueHTML}</div>`;
    }

    // Render completed appointments
    function renderCompleted(tickets) {
      const container = document.getElementById('completedContainer');
      
      if (tickets.length === 0) {
        container.innerHTML = `
          <div class="no-queue">
            <p>No recently completed appointments.</p>
          </div>
        `;
        return;
      }

      const completedHTML = tickets.slice(0, 5).map(ticket => {
        const ticketId = generateTicketId(ticket.id);
        
        return `
          <div class="queue-item">
            <div class="queue-position">✓</div>
            <div class="queue-info">
              <div class="patient-name">
                #${ticketId} - ${ticket.fullName || 'Patient'}
              </div>
              <div class="appointment-time">
                Completed at ${formatTime(ticket.appointmentTime)}
              </div>
            </div>
            <div class="queue-status status-next">Completed</div>
          </div>
        `;
      }).join('');

      container.innerHTML = `<div class="queue-list">${completedHTML}</div>`;
    }

    // Show emergency alert
    function showEmergencyAlert(message) {
      const alert = document.getElementById('emergencyAlert');
      const messageEl = document.getElementById('emergencyMessage');
      
      messageEl.textContent = message;
      alert.classList.add('show');
      
      // Auto-hide after 10 seconds
      setTimeout(() => {
        alert.classList.remove('show');
      }, 10000);
    }

    // Load real-time queue data
    function loadQueueData() {
      // Listen to active queue
      queueListener = db.collection("tickets")
        .where("status", "in", ["Open", "Waiting", "In Progress"])
        .onSnapshot(snapshot => {
          const queueTickets = [];
          snapshot.forEach(doc => {
            queueTickets.push({ id: doc.id, ...doc.data() });
          });
          
          renderQueue(queueTickets);
          
          // Load completed tickets for stats
          loadCompletedData(queueTickets);
        }, error => {
          console.error("Error loading queue:", error);
          document.getElementById('queueContainer').innerHTML = `
            <div class="no-queue">
              <h3>Error Loading Queue</h3>
              <p>Unable to load queue data. Please refresh the page.</p>
            </div>
          `;
        });
    }

    // Load completed appointments
    function loadCompletedData(queueTickets) {
      completedListener = db.collection("tickets")
        .where("status", "==", "Closed")
        .orderBy("timestamp", "desc")
        .limit(10)
        .onSnapshot(snapshot => {
          const completedTickets = [];
          snapshot.forEach(doc => {
            completedTickets.push({ id: doc.id, ...doc.data() });
          });
          
          renderCompleted(completedTickets);
          updateStats(queueTickets, completedTickets);
        });
    }

    // Listen for emergency notifications
    function listenForEmergencies() {
      db.collection("notifications")
        .where("type", "==", "doctor_emergency")
        .orderBy("timestamp", "desc")
        .limit(1)
        .onSnapshot(snapshot => {
          snapshot.forEach(doc => {
            const notification = doc.data();
            const notificationTime = notification.timestamp.toDate();
            const now = new Date();
            
            // Show alert if notification is less than 5 minutes old
            if ((now - notificationTime) < 5 * 60 * 1000) {
              showEmergencyAlert(notification.message || "Doctor emergency - appointments may be delayed");
            }
          });
        });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadQueueData();
      listenForEmergencies();
    });

    // Cleanup listeners on page unload
    window.addEventListener('beforeunload', () => {
      if (queueListener) queueListener();
      if (completedListener) completedListener();
    });
  </script>
</body>
</html>
