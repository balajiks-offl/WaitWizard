<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="container">
    <div class="card dashboard-card">
      <h2>Admin Dashboard</h2>
      <div class="stats">
        <div class="stat-box">Total Tickets: <strong>120</strong></div>
        <div class="stat-box">Emergencies: <strong>5</strong></div>
        <div class="stat-box">Cancellations: <strong>3</strong></div>
        <div class="stat-box">Active Doctors: <strong>8</strong></div>
      </div>

      <h3>Recent Tickets</h3>
      <table>
        <thead>
          <tr>
            <th>Ticket #</th>
            <th>User</th>
            <th>Status</th>
            <th>Type</th>
            <th>Doctor</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>#101</td>
            <td>John Doe</td>
            <td>Open</td>
            <td>Normal</td>
            <td>Dr. Smith</td>
          </tr>
        </tbody>
      </table>

      <button class="primary-btn">Manage Tickets</button>
    </div>
  </div>
</body>
</html>
